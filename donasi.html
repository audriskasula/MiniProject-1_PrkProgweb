<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Donasi - PeduliSemua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span>⚡</span> PeduliSemua</a>
        <nav>
            <ul>
                <li><a href="detail.html" class="text-muted text-semibold" style="text-decoration: none;">Batal & Kembali</a></li>
            </ul>
        </nav>
    </header>

    <div class="container center-card-layout">
        <div class="glass-card form-container">
            <div class="donasi-header">
                <p class="donasi-subtitle">Formulir Donasi</p>
                <h2 class="donasi-title">Beasiswa Penuh untuk Talenta IT Muda</h2>
                <p class="text-sm">Penyelenggara: <strong class="text-main">Tim UKDW</strong></p>
            </div>

            <form action="index.html">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="form-control" placeholder="Nama Anda" required>
                </div>
                
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" class="form-control" placeholder="alamat@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Nominal Donasi (IDR)</label>
                    <input type="number" class="form-control" placeholder="Jumlah (min. 10.000)" required>
                </div>
                
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select class="form-control" required>
                        <option value="">Pilih Metode Transfer</option>
                        <option value="bca">BCA - 1234567890 (a.n PeduliSemua)</option>
                        <option value="mandiri">Mandiri - 0987654321 (a.n PeduliSemua)</option>
                        <option value="gopay">GoPay - 08123456789</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Upload Bukti Transfer (Opsional)</label>
                    <input type="file" class="form-control donasi-file-input" accept=".jpg,.jpeg,.png,.pdf">
                </div>

                <div class="form-group mb-4">
                    <label>Pesan Dukungan (Opsional)</label>
                    <textarea class="form-control" rows="3" placeholder="Tuliskan semangat atau doa Anda..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Kirim Donasi Sekarang</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PeduliSemua - Sistem Crowdfunding Sosial. All rights reserved.</p>
    </footer>

</body>
</html>
