<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Donasi - CareFund</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span>⚡</span> PeduliSemua</a>
        <nav>
            <ul>
                <li><a href="detail.html">Batal & Kembali</a></li>
            </ul>
        </nav>
    </header>

    <div class="container center-card-layout">
        <div class="glass-card form-container">
            <div style="text-align: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <h3 style="color: var(--primary);">Anda berdonasi untuk:</h3>
                <h2>Beasiswa Penuh untuk Talenta IT Muda</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Penyelenggara: Tim UKDW</p>
            </div>

            <form action="index.html">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="form-control" placeholder="Masukkan nama Anda" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="alamat@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Nominal Donasi (Rp)</label>
                    <input type="number" class="form-control" placeholder="Contoh: 100000" required>
                </div>
                
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select class="form-control" required>
                        <option value="">Pilih Metode Transfer</option>
                        <option value="bca">BCA - 1234567890 (a.n CareFund)</option>
                        <option value="mandiri">Mandiri - 0987654321 (a.n CareFund)</option>
                        <option value="gopay">GoPay - 08123456789</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pesan Dukungan (Opsional)</label>
                    <textarea class="form-control" rows="3" placeholder="Tuliskan semangat atau doa Anda..."></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Bukti Transfer (PDF/JPG/PNG)</label>
                    <input type="file" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required style="padding: 0.7rem;">
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Kirim Donasi</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CareFund - Sistem Crowdfunding Sosial. All rights reserved.</p>
    </footer>

</body>
</html>
