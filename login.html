<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareFund</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo"><span>⚡</span> CareFund</a>
    </header>

    <div class="container center-card-layout">
        <div class="glass-card form-container" style="max-width: 400px; text-align: center;">
            <h2 style="margin-bottom: 0.5rem;">Selamat Datang Kembali</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Silakan masuk untuk mengelola kampanye atau donasi Anda.</p>

            <form action="index.html" style="text-align: left;">
                <div class="form-group">
                    <label>Username / Email</label>
                    <input type="text" class="form-control" placeholder="Masukkan username/email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
            </form>
            
            <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
                <a href="index.html" style="color: var(--primary); text-decoration: none;">&larr; Kembali ke Halaman Utama</a>
            </p>
        </div>
    </div>

</body>
</html>
